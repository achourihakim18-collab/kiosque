<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosque Ultra Complet</title>
<style>
    /* Fond animé */
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(45deg, #74ebd5, #ACB6E5, #f7797d, #fbd786);
        background-size: 600% 600%;
        animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    /* Kiosque central */
    .kiosque {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 25px;
        padding: 50px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        max-width: 700px;
        width: 90%;
        position: relative;
        animation: fadeIn 1s ease-out;
    }

    h1 {
        font-size: 3em;
        color: #333;
        margin-bottom: 20px;
        animation: slideIn 1s ease-out;
    }

    p {
        font-size: 1.2em;
        color: #555;
        margin-bottom: 30px;
    }

    button {
        padding: 15px 35px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 15px;
        background: #ff7e5f;
        color: white;
        cursor: pointer;
        transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
        box-shadow: 0 5px 25px rgba(0,0,0,0.2);
    }

    button:hover {
        transform: translateY(-5px) scale(1.05);
        background: #feb47b;
        box-shadow: 0 10px 35px rgba(0,0,0,0.3);
    }

    img {
        max-width: 120px;
        margin: 15px;
        border-radius: 15px;
        transition: transform 0.5s;
    }

    img:hover {
        transform: rotate(15deg) scale(1.1);
    }

    video {
        margin-top: 20px;
        border-radius: 20px;
        max-width: 100%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    @keyframes fadeIn {
        from {opacity:0;} to {opacity:1;}
    }

    @keyframes slideIn {
        from {transform: translateY(-30px); opacity:0;}
        to {transform: translateY(0); opacity:1;}
    }
</style>
</head>
<body>

<div class="kiosque">
    <h1>Kiosque Ultra Complet</h1>
    <p>Choisis une action :</p>

    <button onclick="action1()">Ouvrir Google</button>
    <button onclick="action2()">Afficher Message</button>
    <button onclick="action3()">Ouvrir PDF</button>
    <button onclick="action4()">Ouvrir YouTube</button>
    <button onclick="action5()">Afficher Image</button>
    <button onclick="action6()">Lire Vidéo</button>

    <div id="imageContainer"></div>

    <video id="videoDemo" controls style="display:none;">
        <source src="exemple.mp4" type="video/mp4">
        Ton navigateur ne supporte pas la lecture vidéo.
    </video>
</div>

<script>
    function action1() {
        window.open('https://www.google.com', '_blank');
    }

    function action2() {
        alert('Bienvenue sur ton kiosque ultra complet !');
    }

    function action3() {
        window.open('exemple.pdf', '_blank');
    }

    function action4() {
        window.open('https://www.youtube.com', '_blank');
    }

    function action5() {
        const container = document.getElementById('imageContainer');
        container.innerHTML = `
            <img src="https://via.placeholder.com/120" alt="Image 1">
            <img src="https://via.placeholder.com/120/ff7e5f" alt="Image 2">
            <img src="https://via.placeholder.com/120/feb47b" alt="Image 3">
        `;
    }

    function action6() {
        const video = document.getElementById('videoDemo');
        video.style.display = 'block';
        video.play();
    }
</script>

</body>
</html>
