<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosque Cartoon Avancé</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f0f5;
    padding: 20px;
    transition: background 0.3s;
}
h1 { margin-bottom: 20px; }
button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #4CAF50;
    color: white;
    transition: 0.3s;
}
button:hover { background: #45a049; transform: scale(1.05); }
.section { display: none; margin-top: 20px; }
#cataloguePreview img, #iaPreview img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    margin: 10px;
    border: 2px solid #ccc;
    border-radius: 8px;
    transition: transform 0.3s;
}
#cataloguePreview img:hover, #iaPreview img:hover { transform: scale(1.1); }
.tshirt {
    width: 200px;
    height: 200px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #999;
    display: inline-block;
    position: relative;
    margin: 10px;
    transition: transform 0.3s;
}
.tshirt img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
select, input[type="color"] { margin: 5px; padding: 5px; }
</style>
</head>
<body>

<h1>Kiosque Cartoon Avancé</h1>

<button onclick="showSection('catalogue')">Catalogue</button>
<button onclick="showSection('ia')">Créé par IA</button>

<!-- CATALOGUE -->
<div id="catalogue" class="section">
    <h2>Catalogue T-shirts</h2>
    <input type="file" id="catalogueInput" accept="image/*" multiple>
    <label>Couleur T-shirt:
        <input type="color" id="tshirtColor" value="#ffffff">
    </label>
    <label>Taille:
        <select id="tshirtSize">
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
        </select>
    </label>
    <div id="cataloguePreview"></div>
</div>

<!-- IA -->
<div id="ia" class="section">
    <h2>Créé par IA (Webcam + Filtres)</h2>
    <video id="webcam" autoplay playsinline width="300" height="225" style="border:2px solid #333; border-radius:8px;"></video>
    <br>
    <label>Choisir un filtre:
        <select id="filterSelect">
            <option value="none">Normal</option>
            <option value="cartoon1">Cartoon 1</option>
            <option value="cartoon2">Cartoon 2</option>
            <option value="manga">Manga</option>
            <option value="sketch">Croquis</option>
        </select>
    </label>
    <br>
    <button onclick="captureImage()">Prendre Photo</button>
    <div id="iaPreview"></div>
</div>

<script>
// Affichage des sections
function showSection(section) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(section).style.display = 'block';
}

// Catalogue
const catalogueInput = document.getElementById('catalogueInput');
const cataloguePreview = document.getElementById('cataloguePreview');
const tshirtColor = document.getElementById('tshirtColor');

catalogueInput.addEventListener('change', () => {
    cataloguePreview.innerHTML = '';
    Array.from(catalogueInput.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            const tshirtDiv = document.createElement('div');
            tshirtDiv.classList.add('tshirt');
            tshirtDiv.style.backgroundColor = tshirtColor.value;
            tshirtDiv.innerHTML = <img src="${e.target.result}" alt="Tshirt">;
            cataloguePreview.appendChild(tshirtDiv);
        };
        reader.readAsDataURL(file);
    });
});

// Webcam
const webcam = document.getElementById('webcam');
const iaPreview = document.getElementById('iaPreview');

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => webcam.srcObject = stream)
.catch(err => console.error("Webcam non accessible:", err));

// Capture photo + appliquer filtre
function captureImage() {
    const canvas = document.createElement('canvas');
    canvas.width = webcam.videoWidth;
    canvas.height = webcam.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(webcam, 0, 0, canvas.width, canvas.height);

    const img = document.createElement('img');
    img.src = canvas.toDataURL();

    // Appliquer filtre choisi
    const filter = document.getElementById('filterSelect').value;
    switch(filter){
        case 'cartoon1':
            img.style.filter = 'contrast(1.5) saturate(1.5) brightness(1.1) drop-shadow(2px 2px 2px #000)';
            break;
        case 'cartoon2':
            img.style.filter = 'contrast(1.😎 saturate(1.😎 hue-rotate(10deg)';
            break;
        case 'manga':
            img.style.filter = 'grayscale(0.3) contrast(2) brightness(1.2)';
            break;
        case 'sketch':
            img.style.filter = 'grayscale(1) contrast(2) brightness(1.2) invert(0.2)';
            break;
        default:
            img.style.filter = 'none';
    }

    iaPreview.appendChild(img);
}
</script>

</body>
</html>
