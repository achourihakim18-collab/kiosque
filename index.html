<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Kiosque Pro+</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    overflow: hidden;
}

.screen {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.active { display: flex; }

h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

.button {
    padding: 18px;
    margin: 10px;
    width: 260px;
    text-align: center;
    background: linear-gradient(45deg,#00c3ff,#00ffcc);
    color: black;
    font-size: 20px;
    border-radius: 14px;
    cursor: pointer;
}

.products {
    display: flex;
    gap: 20px;
}

.product {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 12px;
}

.product img {
    width: 120px;
    border-radius: 10px;
}

#screensaver {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    animation: fade 2s infinite alternate;
}

@keyframes fade {
    from {opacity:0.3;}
    to {opacity:1;}
}
</style>
</head>

<body onclick="resetTimer()">

<!-- Accueil -->
<div id="home" class="screen active">
    <h1>Kiosque Digital</h1>
    <div class="button" onclick="show('catalogue')">Catalogue</div>
    <div class="button" onclick="show('camera')">Caméra</div>
    <div class="button" onclick="show('contact')">Contact</div>
</div>

<!-- Catalogue -->
<div id="catalogue" class="screen">
    <h1>Produits</h1>

    <div class="products">
        <div class="product">
            <img src="https://via.placeholder.com/120">
            <p>Produit 1</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/120">
            <p>Produit 2</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/120">
            <p>Produit 3</p>
        </div>
    </div>

    <div class="button" onclick="show('home')">Retour</div>
</div>

<!-- Caméra -->
<div id="camera" class="screen">
    <h1>Caméra</h1>
    <video id="video" width="300" autoplay></video>
    <canvas id="canvas" width="300" height="200"></canvas>

    <div class="button" onclick="startCamera()">Activer</div>
    <div class="button" onclick="capture()">Photo</div>
    <div class="button" onclick="show('home')">Retour</div>
</div>

<!-- Contact -->
<div id="contact" class="screen">
    <h1>Contact</h1>
    <p>📞 0550 00 00 00</p>
    <div class="button" onclick="show('home')">Retour</div>
</div>

<!-- Écran de veille -->
<div id="screensaver" onclick="hideScreensaver()">
    Touchez pour commencer
</div>

<script>
function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        document.getElementById('video').srcObject = stream;
    })
    .catch(() => alert("Caméra bloquée"));
}

function capture() {
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    ctx.drawImage(video,0,0,300,200);
}

// écran de veille
let timer;
function resetTimer() {
    clearTimeout(timer);
    document.getElementById('screensaver').style.display="none";
    timer = setTimeout(()=>{
        document.getElementById('screensaver').style.display="flex";
    },20000);
}

function hideScreensaver(){
    document.getElementById('screensaver').style.display="none";
    resetTimer();
}

resetTimer();
</script>

</body>
</html>
