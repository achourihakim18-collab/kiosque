<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Kiosque Pro+</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    overflow: hidden;
}

.screen {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.active { display: flex; }

h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

.button {
    padding: 18px;
    margin: 10px;
    width: 260px;
    text-align: center;
    background: linear-gradient(45deg,#00c3ff,#00ffcc);
    color: black;
    font-size: 20px;
    border-radius: 14px;
    cursor: pointer;
}

.products {
    display: flex;
    gap: 20px;
}

.product {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 12px;
}

.product img {
    width: 120px;
    border-radius: 10px;
}

#screensaver {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    animation: fade 2s infinite alternate;
}

@keyframes fade {
    from {opacity:0.3;}
    to {opacity:1;}
}
</style>
</head>

<body onclick="resetTimer()">

<!-- Accueil -->
<div id="home" class="screen active">
    <h1>Kiosque Digital</h1>
    <div class="button" onclick="show('catalogue')">Catalogue</div>
    <div class="button" onclick="show('camera')">Caméra</div>
    <div class="button" onclick="show('contact')">Contact</div>
</div>

<!-- Catalogue -->
<div id="catalogue" class="screen">
    <h1>Produits</h1>

    <div class="products">
        <div class="product">
            <img src="https://via.placeholder.com/120">
            <p>Produit 1</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/120">
            <p>Produit 2</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/120">
            <p>Produit 3</p>
        </div>
    </div>

    <div class="button" onclick="show('home')">Retour</div>
</div>

<!-- Caméra -->
<div id="camera" class="screen">
    <h1>Caméra</h1>
    <video id="video" width="300" autoplay></video>
    <canvas id="canvas" width="300" height="200"></canvas>

    <div class="button" onclick="startCamera()">Activer</div>
    <div class="button" onclick="capture()">Photo</div>
    <div class="button" onclick="show('home')">Retour</div>
</div>

<!-- Contact -->
<div id="contact" class="screen">
    <h1>Contact</h1>
    <p>📞 0550 00 00 00</p>
    <div class="button" onclick="show('home')">Retour</div>
</div>

<!-- Écran de veille -->
<div id="screensaver" onclick="hideScreensaver()">
    Touchez pour commencer
</div>

<script>
function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        document.getElementById('video').srcObject = stream;
    })
    .catch(() => alert("Caméra bloquée"));
}

function capture() {
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    ctx.drawImage(video,0,0,300,200);
}

// écran de veille
let timer;
function resetTimer() {
    clearTimeout(timer);
    document.getElementById('screensaver').style.display="none";
    timer = setTimeout(()=>{
        document.getElementById('screensaver').style.display="flex";
    },20000);
}

function hideScreensaver(){
    document.getElementById('screensaver').style.display="none";
    resetTimer();
}

resetTimer();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosque Pro Animé</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }
    .kiosque {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 25px;
        padding: 50px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        animation: fadeIn 1s ease-out;
        position: relative;
        max-width: 600px;
        width: 90%;
    }
    h1 {
        font-size: 2.8em;
        color: #333;
        margin-bottom: 15px;
        animation: slideIn 1s ease-out;
    }
    p {
        font-size: 1.2em;
        color: #555;
        margin-bottom: 25px;
    }
    button {
        padding: 15px 30px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 15px;
        background: #ff7e5f;
        color: white;
        cursor: pointer;
        transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    button:hover {
        transform: translateY(-5px) scale(1.05);
        background: #feb47b;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    img {
        max-width: 100px;
        margin: 10px;
        border-radius: 15px;
        transition: transform 0.5s;
    }
    img:hover {
        transform: rotate(10deg) scale(1.1);
    }
    @keyframes fadeIn {
        from {opacity:0;} to {opacity:1;}
    }
    @keyframes slideIn {
        from {transform: translateY(-20px); opacity:0;}
        to {transform: translateY(0); opacity:1;}
    }
</style>
</head>
<body>
<div class="kiosque">
    <h1>Kiosque Pro Animé</h1>
    <p>Choisis une action :</p>
    <button onclick="action1()">Ouvrir Google</button>
    <button onclick="action2()">Afficher Message</button>
    <button onclick="action3()">Ouvrir PDF</button>
    <button onclick="action4()">Ouvrir YouTube</button>
    <button onclick="action5()">Afficher Image</button>

    <div id="imageContainer"></div>
</div>

<script>
    function action1() {
        window.open('https://www.google.com', '_blank');
    }
    function action2() {
        alert('Bienvenue sur ton kiosque animé pro !');
    }
    function action3() {
        window.open('exemple.pdf', '_blank');
    }
    function action4() {
        window.open('https://www.youtube.com', '_blank');
    }
    function action5() {
        const container = document.getElementById('imageContainer');
        container.innerHTML = '<img src="https://via.placeholder.com/100" alt="Exemple Image">';
    }
</script>
</body>
</html>
